<%+header%>
<link rel="stylesheet" href="/luci-static/resources/bandwidthbydevice/style.css">

<h2><%:Bandwidth by Device%></h2>

<div id="bbd-controls">
  <label><%:Refresh interval:%>
    <select id="bbd-interval">
      <option value="5000">5s</option>
      <option value="10000" selected>10s</option>
      <option value="30000">30s</option>
      <option value="0"><%:Paused%></option>
    </select>
  </label>
  <span id="bbd-last-updated"></span>
</div>

<div id="bbd-device-list">
  <p class="bbd-loading"><%:Loading devices...%></p>
</div>

<script src="/luci-static/resources/bandwidthbydevice/chart.min.js"></script>
<script src="/luci-static/resources/bandwidthbydevice/app.js"></script>
<script>
  BBD.init({
    mode: "overview",
    apiBase: "<%=luci.dispatcher.build_url("admin","status","bandwidthbydevice","api")%>"
  });
</script>
<%+footer%>
